<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOWNLOAD</title>

<style>
body{
    margin:0;
    font-family:Arial;
    overflow-x:hidden;
    background:#000;
}

/* OVERLAY */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(6px);
    z-index:-2;
}

.fade{
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.7));
    z-index:-1;
}

/* LOADER */
#loader{
    position:fixed;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.loader{
    display:flex;
    gap:10px;
}

.loader span{
    width:12px;
    height:12px;
    background:white;
    border-radius:50%;
    animation:bounce 0.6s infinite alternate;
}

.loader span:nth-child(2){animation-delay:0.1s;}
.loader span:nth-child(3){animation-delay:0.2s;}
.loader span:nth-child(4){animation-delay:0.3s;}
.loader span:nth-child(5){animation-delay:0.4s;}

@keyframes bounce{
    from{transform:translateY(0);opacity:0.3;}
    to{transform:translateY(-15px);opacity:1;}
}

/* CONTENT */
#content{
    display:none;
    position:relative;
    z-index:1;
}

/* AD BOX */
.adbox{
    width:90%;
    height:150px;
    margin:40px auto 10px auto;
    background:#111;
    border-radius:10px;
    overflow:hidden;
}

.adbox video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* LINE */
.line{
    width:100%;
    height:3px;
    background:white;
}

/* SEARCH BAR */
.search-box{
    width:90%;
    margin:20px auto;
    display:flex;
    justify-content:center;
}

.search-box input{
    width:100%;
    padding:12px 15px;
    border:none;
    border-radius:25px;
    outline:none;
    background:#222;
    color:white;
    font-size:16px;
}

/* WHITE BOX */
.white-box{
    width:88%;
    margin:15px auto;
    padding:15px;
    height:110px;
    background:white;
    border-radius:15px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

/* TEXT */
.file-info{
    color:black;
    font-size:16px;
    font-weight:bold;
}

/* DOWNLOAD BUTTON */
.download-btn{
    padding:10px 18px;
    background:black;
    color:white;
    border:none;
    border-radius:20px;
    font-size:14px;
    font-weight:bold;
    text-decoration:none;
    display:inline-block;

    /* ✅ BLUE HIGHLIGHT REMOVE */
    -webkit-tap-highlight-color: transparent;
}

.download-btn:hover{
    background:#333;
}

.download-btn:focus{
    outline:none;
}

.download-btn:active{
    background:black;
}
</style>
</head>

<body>

<div class="overlay"></div>
<div class="fade"></div>

<!-- LOADER -->
<div id="loader">
    <div class="loader">
        <span></span><span></span><span></span><span></span><span></span>
    </div>
</div>

<!-- CONTENT -->
<div id="content">

<!-- VIDEO ADS BOX -->
<div class="adbox">
    <video autoplay muted loop playsinline>
        <source src="https://github.com/interflaofficialsh-cpu/Game-Store/raw/refs/heads/main/lv_0_20260317142802.mp4" type="video/mp4">
    </video>
</div>

<div class="line"></div>

<!-- SEARCH BAR -->
<div class="search-box">
    <input type="text" id="searchInput" placeholder="Search here..." onkeyup="searchBox()">
</div>

<!-- BOX 1 -->
<div class="white-box" data-name="TEST 1">
    <div class="file-info">TEST 1 &nbsp;&nbsp; 00 - MB / GB</div>
    <a href="https://www.mediafire.com/view/pbp34vm4anjtbyw/20260317_125106.png/file" target="_blank" class="download-btn">DOWNLOAD</a>
</div>

<!-- BOX 2 -->
<div class="white-box" data-name="TEST 2">
    <div class="file-info">TEST 2 &nbsp;&nbsp; 00 - MB / GB</div>
    <a href="https://www.mediafire.com/" target="_blank" class="download-btn">DOWNLOAD</a>
</div>

</div>

<script>
window.addEventListener("load", () => {
    document.getElementById("loader").style.display = "none";
    document.getElementById("content").style.display = "block";
});

/* SEARCH FUNCTION */
function searchBox(){
    let input = document.getElementById("searchInput").value.toLowerCase();
    let boxes = document.querySelectorAll(".white-box");

    boxes.forEach(box => {
        let name = box.getAttribute("data-name").toLowerCase();

        if(name.includes(input)){
            box.style.display = "flex";
        }else{
            box.style.display = "none";
        }
    });
}
</script>

</body>
</html>
