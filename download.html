<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Downloads</title>

<style>

body{
    margin:0;
    font-family:Arial;
    overflow-x:hidden;
}

/* LOADING SCREEN */
.loader{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.loader .dot{
    width:12px;
    height:12px;
    margin:5px;
    background:white;
    border-radius:50%;
    animation:bounce 1.2s infinite;
}

.loader .dot:nth-child(1){animation-delay:0s;}
.loader .dot:nth-child(2){animation-delay:0.2s;}
.loader .dot:nth-child(3){animation-delay:0.4s;}
.loader .dot:nth-child(4){animation-delay:0.6s;}
.loader .dot:nth-child(5){animation-delay:0.8s;}

@keyframes bounce{
    0%,80%,100%{
        transform:scale(0.5);
        opacity:0.3;
    }
    40%{
        transform:scale(1.2);
        opacity:1;
    }
}

/* VIDEO BACKGROUND */
.bgvideo{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-1;
    filter: blur(10px);
}

/* DARK OVERLAY */
body::after{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    z-index:-1;
}

/* top bar */
.topbar{
    width:100%;
    height:60px;
    background:rgba(255,255,255,0.8);
    backdrop-filter:blur(10px);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    font-weight:bold;
}

/* search bar */
.searchbox{
    display:flex;
    justify-content:center;
    margin-top:30px;
}

.searchbox input{
    width:260px;
    height:38px;
    border:none;
    border-radius:6px;
    padding-left:10px;
    font-size:14px;
    font-weight:bold; /* TEXT BOLD */
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(10px);
    color:black; /* TEXT BLACK */
    outline:none;
}

/* placeholder color */
.searchbox input::placeholder{
    color:black;
    font-weight:bold;
}

/* download box */
.imagebox{
    width:90%;
    height:150px;
    margin:40px auto;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);
    border-radius:10px;
    overflow:hidden;
    position:relative;
    border:1px solid rgba(255,255,255,0.2);
}

.imagebox img{
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0.7;
}

.whitebar{
    width:100%;
    height:40px;
    background:rgba(255,255,255,0.8);
    backdrop-filter:blur(10px);
    position:absolute;
    bottom:0;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 10px;
    box-sizing:border-box;
}

.size{
    font-size:13px;
    font-weight:bold;
}

.name{
    font-size:14px;
    font-weight:bold;
}

.downloadbtn{
    background:black;
    color:white;
    border:none;
    padding:6px 12px;
    border-radius:5px;
    cursor:pointer;
    margin-right:8px;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="loader" id="loader">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
</div>

<video class="bgvideo" id="bgvideo" autoplay muted loop>
<source src="https://github.com/interflaofficialsh-cpu/Game-Store/raw/refs/heads/main/Video.mp4" type="video/mp4">
</video>

<div class="topbar">
DOWNLOADS
</div>

<div class="searchbox">
<input type="text" id="search" placeholder="Search name..." onkeyup="searchFiles()">
</div>

<div class="imagebox">
<img src="https://i.ibb.co/C5Yr6hQf/test-5.webp">
<div class="whitebar">
<div class="size">00 MB / GB</div>
<div class="name">TEST 1</div>
<a class="downloadbtn" href="https://www.mediafire.com/folder/t7pvz1jruybzh/WEBSITE+UPCOMING" target="_blank">DOWNLOAD</a>
</div>
</div>
  
<div class="imagebox">
<img src="https://i.ibb.co/C5Yr6hQf/test-5.webp">
<div class="whitebar">
<div class="size">00 MB / GB</div>
<div class="name">TEST 2</div>
<a class="downloadbtn" href="https://www.mediafire.com/folder/t7pvz1jruybzh/WEBSITE+UPCOMING" target="_blank">DOWNLOAD</a>
</div>
</div>


<script>
function searchFiles(){
let input = document.getElementById("search").value.toLowerCase();
let boxes = document.querySelectorAll(".imagebox");

boxes.forEach(box => {
let name = box.querySelector(".name").textContent.toLowerCase();

if(name.includes(input)){
box.style.display="block";
}else{
box.style.display="none";
}
});
}

let video = document.getElementById("bgvideo");

video.addEventListener("canplaythrough", function(){
    document.getElementById("loader").style.display = "none";
});
</script>

</body>
</html>
