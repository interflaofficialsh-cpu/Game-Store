<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Download App</title>

  <link rel="manifest" href="manifest.json">

  <meta name="theme-color" content="#111111">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
      font-family: Arial;
    }

    #installBtn {
      padding: 20px 40px;
      font-size: 20px;
      background: #28a745;
      border: none;
      border-radius: 12px;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    #installBtn:hover {
      background: #218838;
      transform: scale(1.1);
    }
  </style>
</head>
<body>

<button id="installBtn">Download App</button>

<script>
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
});

document.getElementById("installBtn").addEventListener("click", () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();

    deferredPrompt.userChoice.then((choiceResult) => {
      if (choiceResult.outcome === 'accepted') {
        alert("App Installed ✅");
      } else {
        alert("Install Cancelled ❌");
      }
      deferredPrompt = null;
    });

  } else {
    alert("Install option not available 😢");
  }
});

// Register Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js')
    .then(() => console.log("Service Worker Registered"));
}
</script>

</body>
</html>
