<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Video Background Blur</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:'Orbitron', sans-serif;
overflow-y:auto;
text-align:center;
color:white;
}

/* remove mobile blue tap highlight */
a, button{
-webkit-tap-highlight-color: transparent;
outline:none;
}

/* container */
.container{
position:relative;
z-index:1;
padding-top:20px;
padding-bottom:80px;
}

/* loading screen */
#loader{
position:fixed;
width:100%;
height:100%;
background:#111;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
transition:opacity 0.8s ease;
}

#loader.hide{
opacity:0;
pointer-events:none;
}

/* loading dots */
.loader{
display:flex;
gap:12px;
}

.loader span{
width:14px;
height:14px;
background:white;
border-radius:50%;
animation:bounce 1s infinite;
}

.loader span:nth-child(1){animation-delay:0s;}
.loader span:nth-child(2){animation-delay:0.2s;}
.loader span:nth-child(3){animation-delay:0.4s;}
.loader span:nth-child(4){animation-delay:0.6s;}
.loader span:nth-child(5){animation-delay:0.8s;}

@keyframes bounce{
0%,80%,100%{transform:scale(0);opacity:0.3;}
40%{transform:scale(1);opacity:1;}
}

/* background video */
.bgvideo{
position:fixed;
right:0;
bottom:0;
min-width:100%;
min-height:100%;
z-index:-1;
filter:blur(8px);
transform:scale(1.1);
}

/* profile image (smaller) */
.profile{
width:20vw;
max-width:140px;
min-width:90px;
height:20vw;
max-height:140px;
min-height:90px;
border-radius:50%;
object-fit:cover;
display:block;
margin:20px auto 10px auto;
}

/* logo text (smaller) */
.logo-text{
font-size:14px;
letter-spacing:4px;
text-shadow:0 0 10px rgba(255,255,255,0.6);
margin-bottom:20px;
}

/* button container */
.button-container{
display:flex;
flex-direction:column;
gap:15px;
align-items:center;
}

/* glass buttons (smaller) */
.glass-btn{
padding:10px 28px;
border-radius:25px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.3);
color:white;
font-size:12px;
letter-spacing:1px;
text-decoration:none;
box-shadow:0 0 12px rgba(255,255,255,0.2);
transition:0.3s;
}

.glass-btn:active{
background:rgba(255,255,255,0.1);
transform:scale(1);
}

.glass-btn:hover{
background:rgba(255,255,255,0.2);
transform:scale(1.05);
}

/* social icons (smaller) */
.social-icons{
margin-top:20px;
display:flex;
justify-content:center;
gap:22px;
font-size:20px;
}

.social-icons a{
color:white;
transition:0.3s;
}

.social-icons a:hover{
transform:scale(1.4);
color:#00ffff;
}

/* laptop screens */
@media (min-width:900px){

.profile{
width:160px;
height:160px;
}

.logo-text{
font-size:18px;
}

.button-container{
flex-direction:row;
justify-content:center;
}

.glass-btn{
font-size:14px;
padding:12px 40px;
}

}

/* phone landscape */
@media (orientation: landscape){

.button-container{
flex-direction:row;
justify-content:center;
}

}

</style>

</head>

<body>

<!-- loading screen -->
<div id="loader">
<div class="loader">
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
</div>
</div>

<!-- video background -->
<video autoplay muted loop class="bgvideo" id="bgvideo">
<source src="https://github.com/interflaofficialsh-cpu/Game-Store/raw/refs/heads/main/VID-20260312-WA0016.mp4" type="video/mp4">
</video>

<div class="container">

<img src="https://raw.githubusercontent.com/interflaofficialsh-cpu/Game-Store/refs/heads/main/20260312_085109.png" class="profile" id="profile">

<div class="logo-text">INTERFLASH OFFICIAL</div>

<div class="button-container">

<a href="#" class="glass-btn">BOOKING SECTION</a>

<a href="#" class="glass-btn">DOWNLOAD SECTION</a>

</div>

<!-- social icons -->
<div class="social-icons">

<a href="https://www.tiktok.com/@interflash.official?_r=1&_t=ZS-94caIf05Hy3" target="_blank">
<i class="fab fa-tiktok"></i>
</a>

<a href="https://youtube.com/@interflash.official?si=M8rWAiEiSadU3Iri" target="_blank">
<i class="fab fa-youtube"></i>
</a>

<a href="https://whatsapp.com/channel/0029VbCWfty9hXFEHfGSKj40" target="_blank">
<i class="fab fa-whatsapp"></i>
</a>

<a href="#" onclick="facebookError()">
<i class="fab fa-facebook"></i>
</a>

</div>

</div>

<script>

let video=document.getElementById("bgvideo");
let image=document.getElementById("profile");

let videoLoaded=false;
let imageLoaded=false;

video.oncanplaythrough=function(){
videoLoaded=true;
checkLoaded();
}

image.onload=function(){
imageLoaded=true;
checkLoaded();
}

function checkLoaded(){
if(videoLoaded && imageLoaded){
document.getElementById("loader").classList.add("hide");
}
}

function facebookError(){
alert("ERROR 404\nFacebook Page Not Available");
}

</script>

</body>
</html>
