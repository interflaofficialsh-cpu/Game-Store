<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YouTube Downloader</title>
</head>
<body style="text-align:center; background:#111; color:#fff; padding:50px; font-family:sans-serif;">

<h1>🎬 YouTube Downloader</h1>

<input type="text" id="url" placeholder="Paste YouTube link" style="width:60%; padding:10px;">
<button onclick="downloadVideo()">Download</button>

<p id="status"></p>

<script>
async function downloadVideo() {
  const url = document.getElementById("url").value;
  const status = document.getElementById("status");

  const api = `https://supunmd.vercel.app/api/download/ytmp4/dl?url=${url}&quality=720p&apikey=supunmd-kj5wxaqt3iq3vqde3sxrdl`;

  status.innerText = "Processing...";

  try {
    const res = await fetch(api);
    const data = await res.json();

    if (data.status) {
      const videoUrl = data.data.download_url;

      // 👇 direct download trigger
      const a = document.createElement("a");
      a.href = videoUrl;
      a.download = data.data.title + ".mp4";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      status.innerText = "✅ Download Started!";
    } else {
      status.innerText = "❌ Failed!";
    }

  } catch (err) {
    status.innerText = "⚠️ Error!";
  }
}
</script>

</body>
</html>
