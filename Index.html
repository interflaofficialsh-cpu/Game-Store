<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube MP3 Downloader</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
    padding: 20px;
}

.container {
    max-width: 500px;
    margin: auto;
    background: #1e1e1e;
    padding: 20px;
    border-radius: 10px;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 5px;
}

button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    border: none;
    background: red;
    color: white;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: darkred;
}

.result {
    margin-top: 20px;
    text-align: left;
    background: #2a2a2a;
    padding: 10px;
    border-radius: 5px;
}

a {
    color: lightgreen;
}
</style>
</head>

<body>

<div class="container">
    <h2>🎵 YouTube MP3 Downloader</h2>

    <input type="text" id="url" placeholder="Paste YouTube URL">

    <button onclick="getMP3()">Get MP3 Link</button>

    <div class="result" id="result">
        Result will show here...
    </div>
</div>

<script>
async function getMP3() {

    let url = document.getElementById("url").value;
    let result = document.getElementById("result");

    if (!url) {
        alert("Please enter YouTube URL");
        return;
    }

    result.innerHTML = "Loading... ⏳";

    try {
        let api = `https://supunmd.vercel.app/api/download/ytmp3/dl?url=${encodeURIComponent(url)}&quality=128k&apikey=supunmd-kj5wxaqt3iq3vqde3sxrdl`;

        let res = await fetch(api);
        let data = await res.json();

        if (data.status) {
            result.innerHTML = `
                <p><b>Title:</b> ${data.data.title}</p>
                <p><b>Duration:</b> ${data.data.duration} sec</p>
                <p><b>Quality:</b> ${data.data.quality}</p>
                <p><a href="${data.data.downloadUrl}" target="_blank">⬇ Download MP3</a></p>
            `;
        } else {
            result.innerHTML = "❌ Failed to get MP3";
        }

    } catch (err) {
        result.innerHTML = "❌ Error: " + err.message;
    }
}
</script>

</body>
</html>
