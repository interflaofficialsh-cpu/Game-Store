<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FB Video Downloader</title>
<style>
body { font-family: Arial; text-align:center; margin:50px;}
input { width: 300px; padding:10px; }
button { padding:10px 20px; margin-left:10px; cursor:pointer; }
a.download-link { display:block; margin-top:20px; font-size:18px; color:green; text-decoration:none; }
</style>
</head>
<body>
<h1>Facebook Video Downloader</h1>
<input type="text" id="videoUrl" placeholder="Paste Facebook Video URL">
<button onclick="downloadVideo()">Download</button>
<a id="downloadLink" class="download-link" target="_blank"></a>

<script>
async function downloadVideo(){
    const url = document.getElementById('videoUrl').value;
    if(!url){ alert('Paste the video URL!'); return; }

    // Call backend API
    const response = await fetch('/getVideo?url=' + encodeURIComponent(url));
    const data = await response.json();
    if(data.success){
        const link = document.getElementById('downloadLink');
        link.href = data.videoUrl;
        link.textContent = 'Click here to download video';
    } else {
        alert('Video not found or cannot download!');
    }
}
</script>
</body>
</html>
